<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A tiny project for learning GitHub workflows." />
    <title>GitHub Learning Garden</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">A tiny practice project</p>
      <h1>GitHub Learning Garden</h1>
      <p class="intro">
        Small changes grow into confidence. This website is our safe place to
        practise commits, branches, pull requests, and merges.
      </p>

      <section class="counter" aria-labelledby="counter-title">
        <h2 id="counter-title">Today’s little win</h2>
        <p id="message">You have planted 0 learning seeds.</p>
        <button id="seed-button" type="button">Plant a seed 🌱</button>
      </section>

      <p class="hint">Later, each improvement here will become a real GitHub change.</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
